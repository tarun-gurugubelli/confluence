<header
  class="sticky top-0 z-30 flex h-14 items-center justify-between border-b border-slate-200 bg-white px-4 dark:border-slate-700 dark:bg-slate-800"
>
  <div class="flex items-center gap-3">
    <a routerLink="/home" class="flex items-center gap-2">
      <span
        class="inline-flex h-7 w-7 items-center justify-center rounded bg-slate-800 text-xs font-semibold text-white dark:bg-slate-100 dark:text-slate-900"
      >C</span>
      <span class="text-sm font-semibold tracking-tight text-slate-800 dark:text-slate-100">
        Confluence
      </span>
    </a>
  </div>

  <nav class="flex items-center gap-1">
    <a
      routerLink="/home"
      routerLinkActive="bg-slate-100 dark:bg-slate-700 text-slate-900 dark:text-white"
      class="rounded px-3 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-white"
    >Home</a>
    <a
      routerLink="/register"
      routerLinkActive="bg-slate-100 dark:bg-slate-700 text-slate-900 dark:text-white"
      class="rounded px-3 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-white"
    >Register</a>
  </nav>

  <div class="flex items-center gap-2">
    <button
      type="button"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
      class="inline-flex h-9 w-9 items-center justify-center rounded border border-slate-200 text-slate-600 hover:bg-slate-100 hover:text-slate-900 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-white"
    >
      @if (theme.theme() === 'dark') {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
        </svg>
      }
    </button>
  </div>
</header>

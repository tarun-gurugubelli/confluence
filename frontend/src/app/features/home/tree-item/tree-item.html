<div>
  <button
    type="button"
    (click)="onClick()"
    [class.bg-slate-200]="isSelected()"
    [class.dark:bg-slate-700]="isSelected()"
    [class.font-semibold]="isSelected()"
    [style.padding-left.px]="8 + depth() * 14"
    class="flex w-full items-center gap-1.5 rounded px-2 py-1 text-left text-sm text-slate-700 transition-colors hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-700/60"
  >
    @if (node().type !== 'page' && hasChildren()) {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="h-3 w-3 shrink-0 text-slate-500 transition-transform dark:text-slate-400"
        [class.rotate-90]="expanded()"
      >
        <polyline points="9 18 15 12 9 6" />
      </svg>
    } @else {
      <span class="inline-block h-3 w-3 shrink-0"></span>
    }

    @switch (node().type) {
      @case ('space') {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="h-3.5 w-3.5 shrink-0 text-slate-500 dark:text-slate-400">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <path d="M3 9h18M9 21V9" />
        </svg>
      }
      @case ('folder') {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="h-3.5 w-3.5 shrink-0 text-slate-500 dark:text-slate-400">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" />
        </svg>
      }
      @case ('page') {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="h-3.5 w-3.5 shrink-0 text-slate-500 dark:text-slate-400">
          <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
          <path d="M14 3v5h5" />
        </svg>
      }
    }

    <span class="truncate" [class.font-medium]="node().type === 'space'">{{ node().title }}</span>
  </button>

  @if (expanded() && hasChildren()) {
    @for (child of node().children; track child.id) {
      <app-tree-item
        [node]="child"
        [selectedId]="selectedId()"
        [depth]="depth() + 1"
        (selectPage)="bubble($event)"
      />
    }
  }
</div>
